<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Item - Lost & Found Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Authentication Checker - Protects this page -->
    <script src="../../js/auth-checker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/toaster.js"></script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-section {
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        .image-preview {
            transition: all 0.3s ease;
        }
        
        .image-preview:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header Navigation -->
    <header class="w-full bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <nav class="flex justify-between items-center max-w-7xl mx-auto px-4 py-3">
            <a href="SearchEnginePage.html" class="text-xl font-semibold text-black">Lost & Found</a>
            <div class="flex items-center space-x-6">
                <a href="MyItemsPage.html" class="text-black hover:text-gray-600 transition-colors">My Items</a>
                <a href="ReportItemPage.html" class="text-black font-medium border-b-2 border-black">Report Item</a>
                <a href="MessagesPage.html" class="text-black hover:text-gray-600 transition-colors">Messages</a>
                <a href="ProfilePage.html" class="text-black hover:text-gray-600 transition-colors">Profile</a>
                <button 
                    onclick="showLogoutConfirmation()"
                    class="text-red-600 hover:text-red-700 transition-colors font-medium"
                >
                    Logout
                </button>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 py-8">
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-semibold text-black mb-2">Report an Item</h1>
            <p class="text-gray-600">Help others find their lost items or report something you found</p>
        </div>

        <!-- Report Form -->
        <form id="reportForm" onsubmit="handleSubmit(event)" class="bg-white rounded-lg border border-gray-200 shadow-sm p-6 md:p-8">
            <!-- Item Type Selection -->
            <div class="form-section mb-6">
                <label class="block text-sm font-semibold text-black mb-3">Item Type *</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="relative cursor-pointer">
                        <input type="radio" name="itemType" value="lost" class="peer hidden" required>
                        <div class="border-2 border-gray-300 rounded-lg p-4 text-center peer-checked:border-black peer-checked:bg-black peer-checked:text-white transition-all">
                            <svg class="w-8 h-8 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                            </svg>
                            <div class="font-semibold">Lost Item</div>
                            <div class="text-xs mt-1">Something you lost</div>
                        </div>
                    </label>
                    <label class="relative cursor-pointer">
                        <input type="radio" name="itemType" value="found" class="peer hidden" required>
                        <div class="border-2 border-gray-300 rounded-lg p-4 text-center peer-checked:border-black peer-checked:bg-black peer-checked:text-white transition-all">
                            <svg class="w-8 h-8 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <div class="font-semibold">Found Item</div>
                            <div class="text-xs mt-1">Something you found</div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Item Name -->
            <div class="form-section mb-6">
                <label for="itemName" class="block text-sm font-semibold text-black mb-2">Item Name *</label>
                <input 
                    type="text" 
                    id="itemName" 
                    name="itemName" 
                    required
                    placeholder="e.g., Black Leather Wallet"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-black focus:outline-none transition-colors"
                >
            </div>

            <!-- Description -->
            <div class="form-section mb-6">
                <label for="description" class="block text-sm font-semibold text-black mb-2">Description *</label>
                <textarea 
                    id="description" 
                    name="description" 
                    required
                    rows="4"
                    placeholder="Provide detailed description of the item, including any distinguishing features, colors, brand, etc."
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-black focus:outline-none transition-colors resize-none"
                ></textarea>
            </div>

            <!-- Location -->
            <div class="form-section mb-6">
                <label for="location" class="block text-sm font-semibold text-black mb-2">Location *</label>
                <input 
                    type="text" 
                    id="location" 
                    name="location" 
                    required
                    placeholder="e.g., Central Park, Main Entrance"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-black focus:outline-none transition-colors"
                >
            </div>

            <!-- Date -->
            <div class="form-section mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="date" class="block text-sm font-semibold text-black mb-2">Date *</label>
                    <input 
                        type="date" 
                        id="date" 
                        name="date" 
                        required
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-black focus:outline-none transition-colors"
                    >
                </div>
                <div>
                    <label for="time" class="block text-sm font-semibold text-black mb-2">Time (Optional)</label>
                    <input 
                        type="time" 
                        id="time" 
                        name="time"
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-black focus:outline-none transition-colors"
                    >
                </div>
            </div>

            <!-- Contact Information -->
            <div class="form-section mb-6">
                <label class="block text-sm font-semibold text-black mb-2">Contact Preference *</label>
                <div class="space-y-2">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="contactPreference" value="public" class="w-4 h-4 text-black border-gray-300 focus:ring-black" required>
                        <span class="text-sm text-gray-700">Show my contact information publicly</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="contactPreference" value="private" class="w-4 h-4 text-black border-gray-300 focus:ring-black" required>
                        <span class="text-sm text-gray-700">Keep contact information private (messages only)</span>
                    </label>
                </div>
            </div>

            <!-- Images Upload -->
            <div class="form-section mb-6">
                <label class="block text-sm font-semibold text-black mb-2">Item Photos *</label>
                <p class="text-xs text-gray-500 mb-3">Upload up to 5 photos. At least one photo is required.</p>
                <input 
                    type="file" 
                    id="images" 
                    name="images" 
                    accept="image/*"
                    multiple
                    required
                    onchange="handleImageUpload(event)"
                    class="hidden"
                >
                <label for="images" class="block w-full px-4 py-3 border-2 border-dashed border-gray-300 rounded-lg text-center cursor-pointer hover:border-black transition-colors">
                    <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <span class="text-sm font-medium text-gray-700">Click to upload photos</span>
                </label>
                <div id="imagePreview" class="mt-4 grid grid-cols-2 md:grid-cols-3 gap-4"></div>
            </div>

            <!-- Submit Buttons -->
            <div class="form-section flex space-x-4 pt-4 border-t border-gray-200">
                <button 
                    type="submit" 
                    class="flex-1 px-6 py-3 bg-black text-white rounded-lg hover:bg-gray-800 transition-colors font-semibold"
                >
                    Submit Report
                </button>
                <button 
                    type="button" 
                    onclick="window.location.href='MyItemsPage.html'"
                    class="px-6 py-3 border-2 border-gray-300 text-gray-700 rounded-lg hover:border-black hover:text-black transition-colors font-semibold"
                >
                    Cancel
                </button>
            </div>
        </form>
    </main>

    <script>
        let uploadedImages = [];

        function handleImageUpload(event) {
            const files = Array.from(event.target.files);
            const preview = document.getElementById('imagePreview');
            
            // Limit to 5 images
            const imagesToAdd = files.slice(0, 5 - uploadedImages.length);
            
            imagesToAdd.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        uploadedImages.push({
                            file: file,
                            url: e.target.result
                        });
                        updateImagePreview();
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function updateImagePreview() {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = uploadedImages.map((img, index) => `
                <div class="relative image-preview group">
                    <img src="${img.url}" alt="Preview ${index + 1}" class="w-full h-32 object-cover rounded-lg border-2 border-gray-200">
                    <button 
                        type="button"
                        onclick="removeImage(${index})"
                        class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            updateImagePreview();
            
            // Update file input
            const fileInput = document.getElementById('images');
            const dt = new DataTransfer();
            uploadedImages.forEach(img => dt.items.add(img.file));
            fileInput.files = dt.files;
        }

        async function handleSubmit(event) {
            event.preventDefault();
            
            // Validate images
            if (uploadedImages.length === 0) {
                alert('Please upload at least one photo of the item.');
                return;
            }

            // Validate item type is selected
            const itemType = document.querySelector('input[name="itemType"]:checked');
            if (!itemType) {
                alert('Please select an item type (Lost or Found).');
                return;
            }

            // Get form data
            const formData = new FormData(event.target);
            
            // Add all uploaded images to FormData
            uploadedImages.forEach((img, index) => {
                formData.append('images', img.file);
            });

            // Show loading state
            const submitButton = event.target.querySelector('button[type="submit"]');
            const originalText = submitButton.textContent;
            submitButton.disabled = true;
            submitButton.textContent = 'Submitting...';

            try {
                const response = await fetch('http://localhost:8080/api/auth/item/report', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Item reported successfully!');
                    // Redirect to My Items page
                    window.location.href = 'MyItemsPage.html';
                } else {
                    alert('Failed to report item: ' + (data.message || 'Unknown error'));
                    submitButton.disabled = false;
                    submitButton.textContent = originalText;
                }
            } catch (error) {
                console.error('Error reporting item:', error);
                alert('Failed to report item: ' + error.message);
                submitButton.disabled = false;
                submitButton.textContent = originalText;
            }
        }

        // Set default date to today
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('date');
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
        });

        function showLogoutConfirmation() {
            const modal = document.getElementById('logoutModal');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeLogoutModal(event) {
            const modal = document.getElementById('logoutModal');
            if (event) {
                if (event.target === event.currentTarget || event.target.closest('button[onclick*="closeLogoutModal"]')) {
                    modal.classList.add('hidden');
                    document.body.style.overflow = '';
                }
            } else {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        async function handleLogout() {
            try {
                const token = window.authChecker?.getJWTToken();
                const headers = {
                    'Content-Type': 'application/json'
                };
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                const response = await fetch('http://localhost:8080/api/auth/logout', {
                    method: 'POST',
                    headers: headers,
                    credentials: 'include'
                });

                if (response.ok) {
                    const result = await response.json();
                    toastSuccess('You have been successfully logged out.');
                    closeLogoutModal();
                    setTimeout(() => {
                        window.location.href = 'http://localhost:8080/pages/auth/LoginPage.html';
                    }, 1000);
                } else {
                    const error = await response.json();
                    toastError('Failed to logout: ' + (error.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error logging out:', error);
                toastError('Failed to logout. Please try again.');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const logoutModal = document.getElementById('logoutModal');
                if (logoutModal && !logoutModal.classList.contains('hidden')) {
                    closeLogoutModal();
                }
            }
        });
    </script>

    <!-- Logout Confirmation Modal -->
    <div id="logoutModal" class="hidden fixed inset-0 z-50 overflow-y-auto" onclick="closeLogoutModal(event)">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="fixed inset-0 bg-black bg-opacity-50 transition-opacity"></div>
            <div class="relative bg-white rounded-lg border-2 border-black shadow-xl max-w-md w-full" onclick="event.stopPropagation()">
                <div class="flex items-center justify-between p-6 border-b-2 border-black">
                    <h2 class="text-2xl font-semibold text-black">Confirm Logout</h2>
                    <button 
                        onclick="closeLogoutModal()"
                        type="button"
                        class="text-black hover:text-gray-600 transition-colors"
                    >
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="p-6 space-y-4">
                    <p class="text-gray-700">
                        Are you sure you want to logout? You will need to login again to access your account.
                    </p>
                </div>
                <div class="flex items-center justify-end space-x-4 p-6 border-t-2 border-black bg-gray-50">
                    <button 
                        onclick="closeLogoutModal()"
                        class="px-6 py-2 border-2 border-gray-300 text-gray-700 rounded-lg hover:border-black hover:text-black transition-colors font-semibold"
                    >
                        Cancel
                    </button>
                    <button 
                        onclick="handleLogout()"
                        class="px-6 py-2 bg-black text-white rounded-lg hover:bg-gray-800 transition-colors font-semibold"
                    >
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
