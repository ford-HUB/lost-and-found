<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FindIt Lost & Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        
        .animate-delay-1 {
            animation-delay: 0.1s;
            opacity: 0;
        }
        
        .animate-delay-2 {
            animation-delay: 0.2s;
            opacity: 0;
        }
        
        .animate-delay-3 {
            animation-delay: 0.3s;
            opacity: 0;
        }
        
        .input-focus:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col">
    <!-- Header Navigation -->
    <header class="w-full py-4 px-6 animate-fade-in-up">
        <nav class="flex justify-between items-center max-w-7xl mx-auto">
            <a href="../LandingPage.html" class="flex items-center">
                <img class="h-8 w-8 mr-2" src="../../assets/search.png" alt="FindIt">
                <div class="text-xl font-semibold text-black">FindIt</div>
            </a>
            <div class="flex items-center space-x-4">
                <span class="text-gray-600 text-sm">Don't have an account?</span>
                <a href="SignUp.html" class="px-6 py-2 bg-black text-white rounded-full hover:bg-gray-800 transition-colors font-medium">Sign Up</a>
            </div>
        </nav>
    </header>

    <!-- Main Content - Centered Login Form -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 py-12">
        <!-- Title -->
        <div class="mb-8 animate-fade-in-up animate-delay-1">
            <h1 class="text-5xl font-light text-black tracking-tight text-center">Welcome Back</h1>
            <p class="text-lg text-gray-600 mt-4 text-center font-light">Sign in to your account to continue</p>
        </div>

        <!-- Login Form Container -->
        <div class="w-full max-w-md animate-fade-in-up animate-delay-2">
            <form id="formSubmit" class="space-y-6">
                <!-- Email Input -->
                <div>
                    <label class="block text-sm font-medium text-black mb-2">Email Address</label>
                    <input 
                        type="email" 
                        id="email"
                        placeholder="you@example.com"
                        class="w-full px-4 py-3 border-2 border-black rounded-full input-focus focus:outline-none transition bg-white text-black placeholder-gray-500"
                        required
                    >
                </div>

                <!-- Password Input -->
                <div>
                    <label class="block text-sm font-medium text-black mb-2">Password</label>
                    <input 
                        type="password" 
                        id="password"
                        placeholder="Enter your password"
                        class="w-full px-4 py-3 border-2 border-black rounded-full input-focus focus:outline-none transition bg-white text-black placeholder-gray-500"
                        required
                    >
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input 
                            type="checkbox" 
                            id="rememberMe"
                            class="w-4 h-4 text-black border-2 border-black rounded focus:ring-black"
                            value="true"
                        >
                        <label class="ml-2 text-sm text-gray-600 font-light">Remember me</label>
                    </div>
                    <a href="#" class="text-sm text-black font-medium hover:text-gray-600 transition-colors">Forgot password?</a>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    class="w-full py-3 bg-black text-white rounded-full font-medium hover:bg-gray-800 transition-colors"
                >
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="mt-8 flex items-center">
                <div class="flex-1 border-t border-gray-300"></div>
                <span class="px-4 text-sm text-gray-500 font-light">Or continue with</span>
                <div class="flex-1 border-t border-gray-300"></div>
            </div>

            <!-- Social Login Buttons (Optional) -->
            <div class="mt-6 space-y-3">
                <button class="w-full py-3 border-2 border-black text-black rounded-full font-medium hover:bg-black hover:text-white transition-all flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>

            <!-- Sign Up Link -->
            <div class="mt-8 text-center">
                <p class="text-sm text-gray-600 font-light">
                    Don't have an account? 
                    <a href="SignUp.html" class="text-black font-medium hover:text-gray-600 transition-colors">Sign up</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-4 px-6 border-t border-gray-200">
        <div class="max-w-7xl mx-auto flex justify-between items-center text-sm text-gray-600 font-light">
            <div class="flex space-x-6">
                <a href="#" class="hover:text-black transition-colors">Help Center</a>
                <a href="#" class="hover:text-black transition-colors">Contact</a>
                <a href="#" class="hover:text-black transition-colors">Privacy</a>
            </div>
            <div class="text-gray-500">
                © 2024 FindIt. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/toaster.js"></script>

    <script>
        document.getElementById("formSubmit").addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                rememberMe: document.getElementById("rememberMe").checked
            }
            
            console.log('Login payload:', { ...payload, password: '***' }); // Log without exposing password

            fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload),
                credentials: 'include'
            })
            .then(async response => {
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    console.log('Response data:', data);
                    if (response.ok || response.status === 202) {
                        return data;
                    } else {
                        console.error('Login failed with response:', data);
                        throw new Error(data.message || 'Login failed');
                    }
                } else {
                    const text = await response.text();
                    console.log('Response text:', text);
                    if (response.ok || response.status === 202) {
                        return { message: 'Login successful' };
                    } else {
                        console.error('Login failed with text response:', text);
                        throw new Error(`Login failed with status: ${response.status} - ${text}`);
                    }
                }
            })
            .then(data => {
                toastSuccess(data.message || 'Login successful')
                console.log('successfully loggedIn', data)
                
                // Store JWT token in localStorage for WebSocket connections
                if (data.token) {
                    localStorage.setItem('jwt_token', data.token);
                }

                setTimeout(() => {
                    window.location.href = '../user/SearchEnginePage.html'
                }, 1500)
            })
            .catch(err => {
                console.error('Login error details:', {
                    message: err.message,
                    stack: err.stack,
                    name: err.name
                });
                toastError(err.message || 'Login failed. Please check your credentials.')
            })
        })
    </script>
</body>
</html>
